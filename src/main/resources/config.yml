# ============================================================
# LoginGate 默认配置
# ------------------------------------------------------------
# 提示：
# 1. Minecraft 颜色符号使用 &，例如 &a、&c、&l。
# 2. 修改后使用 /logingate reload 或重启服务器生效。
# 3. 玩家账号数据、桥接门票、语言文案是三类不同配置：
#    - storage：玩家账号数据保存位置。
#    - bridge-verification：双服/多服验证门票保存位置。
#    - lang/zh.yml、lang/en.yml：多语言文案。
# ============================================================


# ============================================================
# 1. 基础显示与语言
# ============================================================

# 服务器显示名称。可在消息占位符 %server% 中使用。
server-name: "Pureblock | 纯境方块"

# 默认语言。可选：zh、en。
default-language: "zh"

# 普通提示文案读取来源。
# lang：优先读取 lang/zh.yml 或 lang/en.yml，适合保留 /lang 切换功能。
# config：优先读取本文件 messages/mail，适合只维护一个配置文件。
message-source: "lang"


# ============================================================
# 2. 登录世界与登录后位置
# ============================================================

# 登录世界名称。
# 留空时插件会根据 login-world-generation.type 自动创建：
# void -> login_void，flat -> login_flat，normal -> login_normal。
loginworld: ""

# 兼容旧配置读取名。一般不需要填写；保留空值即可。
login-world: ""

# 主世界名称。单服 local 模式下，验证成功后会传送到这里。
main-world: "world"

# 传送倒计时中显示的目标名称，不一定要和世界名或子服名一致。
transfer-target-name: "Pureblock"

# 登录成功后传送到主世界或目标服务器前的倒计时秒数。
post-login-countdown-seconds: 3

post-login-location:
  # 是否启用登录后位置策略。
  # false 时始终传送到 main-world 的出生点。
  enabled: true

  # 登录后传送目标。
  # spawn：主世界出生点，适合大厅/主城。
  # last-location：玩家上次离线位置，需要 save-last-location 为 true。
  mode: "spawn"

  # 是否在玩家离线时记录最后位置。
  save-last-location: true

post-login-commands:
  # 是否在玩家完成验证并到达目标位置后执行命令。
  enabled: false

  # 命令执行身份。
  # console：后台执行。
  # player：玩家自己执行。
  executor: "console"

  # 登录后执行的命令列表，不需要开头的 /。
  # 支持占位符：%player%、%server%、%uuid%、%time%。
  commands:
    - "say %player% 已通过 LoginGate 验证"

login-world-generation:
  # 登录世界地形类型。
  # void：虚空世界。
  # flat：超平坦世界。
  # normal：正常世界。
  type: "void"

login-world-settings:
  # 兼容旧配置。true 时使用虚空生成器。
  # 新服务器建议优先修改 login-world-generation.type。
  void-world: true

  # 是否隔离登录世界玩家状态。
  # 开启后进入登录世界会临时处理背包、经验、药水、血量等状态，并在验证完成或退出时恢复。
  isolate-player-state: true

  # 登录世界临时游戏模式。可选：SURVIVAL、CREATIVE、ADVENTURE、SPECTATOR。
  game-mode: "ADVENTURE"

  # 进入登录世界时是否临时清空背包、装备和副手。
  clear-inventory: true

  # 进入登录世界时是否临时清空经验等级。
  reset-exp: true

  # 进入登录世界时是否临时清空药水效果。
  clear-potion-effects: true

  # 进入登录世界时是否临时重置血量、饥饿值、饱和度和燃烧状态。
  reset-health-food: true

  # 验证完成后是否允许恢复进入登录世界前的完整快照。
  # false 时不会恢复背包、装备、模式、经验、药水等快照内容。
  restore-snapshot: true

  # 当 post-login-location.mode 为 spawn 时是否恢复完整快照。
  # 默认 false，适合出生大厅/主城希望玩家保持干净状态的情况。
  restore-snapshot-at-spawn: false

  # 是否禁止登录世界刷新怪物。
  disable-monster-spawn: true

  # 是否禁止登录世界天气变化。
  disable-weather-cycle: true

  # 是否锁定登录世界时间。
  lock-time: true

  # 登录世界锁定的时间刻。18000 为夜晚。
  time: 18000

  # 是否让登录世界内玩家无敌。
  invulnerable: true

  # 是否冻结未验证玩家，防止移动和跳跃。
  freeze-player: true

  # 是否让登录世界内玩家互相不可见。
  hide-other-players: true


# ============================================================
# 3. 验证、安全与限制
# ============================================================

# 登录密码最短长度。
password-min-length: 8

# 邮箱验证码位数。
verification-code-length: 6

# 邮箱验证码有效时间，单位：分钟。
verification-expire-minutes: 10

# 同一个邮箱重复获取验证码的冷却时间，单位：秒。
email-code-cooldown-seconds: 60

# 密码允许连续输错的最大次数。
max-login-attempts: 3

# 密码输错次数过多后的锁定时长，单位：分钟。
login-lock-minutes: 3

email-verification:
  # 是否启用邮箱验证码。
  # false 时注册、改密、改绑邮箱会跳过验证码环节。
  enabled: true

verification-code:
  # 邮箱验证码允许连续输错的最大次数。
  max-attempts: 3

  # 验证码输错过多后的流程锁定时间，单位：分钟。
  # 锁定时只发送聊天消息，不显示 title。
  lock-minutes: 3

email-unique:
  # 是否限制一个邮箱只能绑定一个账号。
  enabled: true

password-strength:
  # 是否要求密码包含至少一个大写字母。
  require-uppercase: false

  # 是否要求密码包含至少一个小写字母。
  require-lowercase: false

  # 是否要求密码包含至少一个数字。
  require-number: false

  # 是否要求密码包含至少一个符号。
  require-symbol: false

remember-session:
  # 是否允许玩家自行开启记住登录。
  # 玩家需要使用 /rememberlogin on 开启。
  enabled: true

  # 记住登录有效期，单位：分钟。
  # 仅同 IP 且未过期时自动登录。
  expire-minutes: 10

security-log:
  # 是否记录注册、登录、失败、锁定、改密、改绑、异常登录等安全日志。
  enabled: true

security-mail:
  # 是否在改密、改绑邮箱、异常登录时发送安全提醒邮件。
  # 需要 smtp.enabled 为 true 且 SMTP 可用。
  enabled: true


# ============================================================
# 4. 单服/多服放行模式
# ============================================================

multi-server:
  # 当前服务器角色。
  # standalone：单服，登录世界和主世界在同一个服务端。
  # login：登录服，只负责验证，验证后转到目标服务器。
  # backend：主服/后端子服，负责校验登录服签发的桥接门票。
  server-role: "standalone"

  # 是否启用多服放行逻辑。
  # false：验证成功后本地传送到 main-world。
  # true：根据 transfer-mode 使用 proxy 或 native-transfer 转服。
  enabled: false

  # 验证成功后的放行方式。
  # local：本地世界传送。
  # proxy：通过 BungeeCord/Velocity 插件消息转服。
  # native-transfer：使用 Paper/Minecraft 原生 transfer 转服。
  transfer-mode: "local"

  # proxy 模式下，代理端配置的目标子服名称。
  target-server: "Pureblock"

  native-transfer:
    # native-transfer 模式下，目标服务器地址。
    host: "127.0.0.1"

    # native-transfer 模式下，目标服务器端口。
    port: 25567

  # proxy 模式使用的插件消息通道。
  # BungeeCord 通常使用 BungeeCord。
  # Velocity 可按代理配置改为 bungeecord:main。
  plugin-message-channel: "BungeeCord"

  # proxy/native-transfer 转服失败时是否回退到本地 main-world。
  # 如果登录服没有主世界，建议设置为 false。
  fallback-to-local-world: true

  # backend 角色接受最近多少秒内完成验证的玩家。
  backend-verified-window-seconds: 300


# ============================================================
# 5. 桥接验证门票
# ------------------------------------------------------------
# 这部分只负责 Login 服和 MC/后端服之间传递“已完成验证”的短期门票。
# 它和 storage.type 是两套配置：
# - storage.type: yaml 仍然可以自定义门票文件夹。
# - bridge-verification.directory 才是 file/local 门票目录。
# ============================================================

bridge-verification:
  # 是否启用桥接验证。
  # login 角色会签发门票，backend 角色会校验门票。
  enabled: false

  # 桥接门票保存方式。
  # file/local：写入本地文件夹，适合同一台机器上的双服。
  # database/db：写入数据库，适合多机器或希望集中管理。
  type: "file"

  # file/local 模式下的门票文件夹位置。
  # 可写相对路径或绝对路径：
  # - 相对路径：相对于 plugins/LoginGate/，例如 "LoginGateBridge"。
  # - 绝对路径：例如 "C:/Servers/LoginGateBridge"。
  # 双服模式下，Login 服和 MC/后端服必须填写同一个目录。
  directory: "LoginGateBridge"

  database:
    # database/db 模式下的门票表名。
    ticket-table: "logingate_bridge_tickets"

    # database/db 模式下的记住登录状态表名。
    remember-table: "logingate_bridge_remember"

  # HMAC 签名密钥。
  # 首次启用且留空时会自动生成；双服/多服所有 LoginGate 实例必须完全一致。
  secret: ""

  # 后端服校验门票时，是否要求玩家 IP 和登录服签发时一致。
  require-ip-match: true

  # 后端服校验门票时，是否要求 Minecraft UUID 和登录服签发时一致。
  require-uuid-match: true

  # 后端服校验成功后是否立即删除门票，防止重复使用。
  consume-on-success: true

  # 玩家绕过登录服直接进入后端服时的踢出提示。
  illegal-bypass-kick: "&c&l您目前的身份验证状态为：非法绕过身份验证！"


# ============================================================
# 6. 玩家账号数据存储
# ------------------------------------------------------------
# 注意：这里保存的是玩家账号、密码哈希、邮箱、登录记录等数据。
# 验证门票文件夹请看上面的 bridge-verification.directory。
# ============================================================

storage:
  # 玩家账号数据存储方式。
  # yaml：默认本地 YAML 文件，路径为 plugins/LoginGate/PlayerInfo/players.yml。
  # sqlite：本地 SQLite 数据库。
  # mysql/mariadb：远程 MySQL 或 MariaDB 数据库。
  type: "yaml"

  sqlite:
    # SQLite 数据库文件位置，相对插件数据目录 plugins/LoginGate/。
    file: "PlayerInfo/players.db"

  mysql:
    # MySQL/MariaDB 地址。
    host: "localhost"

    # MySQL/MariaDB 端口。
    port: 3306

    # 数据库名。
    database: "logingate"

    # 数据库用户名。
    username: "root"

    # 数据库密码。
    password: ""

    # 可选自定义 JDBC URL。
    # 留空时按 host、port、database 自动生成。
    jdbc-url: ""


# ============================================================
# 7. 更新检查
# ============================================================

update-check:
  # 是否在插件启动时检查 GitHub 最新版本。
  enabled: true

  # 公开更新清单地址。
  # 默认使用 raw.githubusercontent.com，不依赖 GitHub API，也不需要 Token。
  manifest-url: "https://raw.githubusercontent.com/MAXStreng/LoginGate/main/update.json"


