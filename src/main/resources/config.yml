# 服务器显示名称，支持 Minecraft 颜色符号 &。
server-name: "Pureblock | 纯境方块"

# 默认语言。可选：zh、en。
default-language: "zh"

# 绑定登录世界名称。留空时插件会按 login-world-generation.type 自动创建 login_void、login_flat 或 login_normal。
loginworld: ""

# 主世界名称，登录或注册完成后会传送到这里。
main-world: "world"

# 传送倒计时中显示的目标名称。
transfer-target-name: "Pureblock"

multi-server:
  # 多服兼容模式。关闭时使用本地 main-world 传送；开启后通过代理插件消息转发到目标子服。
  enabled: false
  # 放行模式。local=本地世界传送，proxy=通过 BungeeCord/Velocity 代理转服。
  transfer-mode: "local"
  # 代理端配置的目标子服名称，开启 proxy 模式后会连接到这里。
  target-server: "Pureblock"
  # 插件消息通道。BungeeCord 常用 BungeeCord；Velocity 可按代理设置改为 bungeecord:main。
  plugin-message-channel: "BungeeCord"
  # 代理转服失败时是否回退到本地 main-world。
  fallback-to-local-world: true

# 登录成功后传送到主世界前的倒计时秒数。
post-login-countdown-seconds: 3

# 登录密码最短长度。
password-min-length: 8

# 邮箱验证码位数。
verification-code-length: 6

# 邮箱验证码有效时间，单位为分钟。
verification-expire-minutes: 10

# 密码输错次数过多后的锁定时长，单位为分钟。
login-lock-minutes: 3

# 密码允许连续输错的最大次数。
max-login-attempts: 3

# 同一个邮箱重复获取验证码的冷却时间，单位为秒。
email-code-cooldown-seconds: 60

update-check:
  # 是否在插件启动时检查 GitHub 最新版本。
  enabled: true
  # 公开更新清单地址。默认使用 raw.githubusercontent.com，不依赖 GitHub API，也不需要 Token。
  manifest-url: "https://raw.githubusercontent.com/MAXStreng/LoginGate/main/update.json"

login-world-generation:
  # 登录世界地形类型。可选：void（虚空）、flat（超平坦）、normal（正常世界）。默认虚空。
  type: "void"

login-world-settings:
  # 兼容旧配置：为 true 时也会使用虚空生成器；新配置请优先使用 login-world-generation.type。
  void-world: true
  # 是否禁止登录世界刷新怪物。
  disable-monster-spawn: true
  # 是否禁止登录世界天气更替。
  disable-weather-cycle: true
  # 是否锁定登录世界时间。
  lock-time: true
  # 登录世界锁定的时间刻，18000 为夜晚。
  time: 18000
  # 是否让登录世界内玩家无敌。
  invulnerable: true
  # 是否冻结未验证玩家，防止移动和跳跃。
  freeze-player: true
  # 是否让登录世界玩家互相不可见。
  hide-other-players: true

messages:
  # 欢迎界面的主标题。
  welcome-title: "&d&lPureblock &8| &b纯境方块"
  # 未注册玩家看到的欢迎副标题。
  welcome-register-subtitle: "&7欢迎抵达身份验证大厅，输入 &e/register &7创建通行证"
  # 已注册玩家看到的欢迎副标题。
  welcome-login-subtitle: "&7欢迎回来，输入 &e/login &7进入主世界"
  # 注册流程：输入邮箱阶段标题。
  title-register-email: "&d&l邮箱注册"
  # 注册流程：输入邮箱阶段副标题。
  subtitle-register-email: "&7请在聊天栏输入 &b邮箱地址"
  # 注册流程：输入验证码阶段标题。
  title-register-code: "&b&l验证码确认"
  # 注册流程：输入验证码阶段副标题。
  subtitle-register-code: "&7请输入邮箱收到的 &e验证码"
  # 注册流程：设置密码阶段标题。
  title-register-password: "&a&l设置密码"
  # 注册流程：设置密码阶段副标题，%min% 为最短密码长度。
  subtitle-register-password: "&7请设置至少 &e%min% &7位的登录密码"
  # 登录流程：输入密码阶段标题。
  title-login-password: "&b&l身份登录"
  # 登录流程：输入密码阶段副标题。
  subtitle-login-password: "&7请输入你的 &e登录密码"
  # 修改密码流程：输入验证码阶段标题。
  title-change-code: "&e&l修改密码"
  # 修改密码流程：输入验证码阶段副标题。
  subtitle-change-code: "&7请输入邮箱收到的 &e改密验证码"
  # 修改密码流程：设置新密码阶段标题。
  title-change-password: "&a&l设置新密码"
  # 修改密码流程：设置新密码阶段副标题。
  subtitle-change-password: "&7请设置新的 &e登录密码"
  # 登录锁定时显示的标题。
  locked-title: "&c&l验证锁定"
  # 登录锁定时显示的副标题，%seconds% 为剩余秒数。
  locked-subtitle: "&7请等待 &e%seconds% &7秒"
  # 登录成功传送倒计时标题。
  transfer-title: "&a&l身份验证完成"
  # 登录成功传送倒计时副标题，%seconds% 为剩余秒数，%target% 为目标名称。
  transfer-subtitle: "&b%seconds% &7秒后传送至 &d%target%"
  # 未注册玩家加入后的聊天提示。
  register-help: "&d&lPureblock &8| &7欢迎来到 &b纯境方块&7。请输入 &e/register &7开始邮箱注册。"
  # 已注册玩家加入后的聊天提示，%player% 为玩家名。
  login-help: "&d&lPureblock &8| &7欢迎回来，&b%player%&7。请输入 &e/login &7完成身份验证。"
  # 提示玩家输入邮箱。
  input-email: "&d&lPureblock &8| &7请在聊天栏输入你的 &b邮箱地址&7，该内容不会广播。"
  # 提示玩家输入密码。
  input-password: "&d&lPureblock &8| &7请在聊天栏输入 &e登录密码&7，该内容不会广播。"
  # 注册验证码已发送提示，%email% 为邮箱。
  register-code-sent: "&b验证码已发送到 &e%email%&b。&7请在聊天栏输入验证码。"
  # 改绑邮箱验证码已发送提示，%email% 为邮箱。
  bind-code-sent: "&b验证码已发送到 &e%email%&b。&7请输入验证码完成改绑。"
  # 修改密码验证码已发送提示。
  change-code-sent: "&b验证码已发送到你的注册邮箱。&7请在聊天栏输入验证码。"
  # 提示玩家在聊天栏输入新的绑定邮箱。
  input-bind-email: "&d&lPureblock &8| &7请在聊天栏输入你要绑定的新 &b邮箱地址&7。"
  # 邮箱格式错误提示。
  invalid-email: "&c邮箱格式不正确，请重新输入。"
  # 验证码错误或过期提示。
  invalid-code: "&c验证码不正确或已过期，请重新开始流程。"
  # 验证码失败页标题。
  verification-failed-title: "&c&l验证失败"
  # 验证码错误时的副标题。
  verification-invalid-subtitle: "&7验证码不正确，请重新开始流程。"
  # 验证码过期时的副标题。
  verification-expired-subtitle: "&7验证码已过期，请重新开始流程。"
  # 验证码错误时的聊天提示。
  verification-invalid-chat: "&c验证码不正确，请重新开始流程。"
  # 验证码过期时的聊天提示。
  verification-expired-chat: "&c验证码已过期，请重新开始流程。"
  # 注册邮箱验证通过后提示。
  code-ok-set-password: "&a邮箱验证成功。&7请设置登录密码。"
  # 修改密码邮箱验证通过后提示。
  code-ok-reset-password: "&a邮箱验证成功。&7请设置新密码。"
  # 注册成功提示，%uuid% 为插件生成的 Pureblock UUID。
  register-success: "&a注册成功。&7你的 Pureblock UUID 为 &d%uuid%&7。"
  # 邮箱改绑成功提示，%old% 为旧邮箱，%new% 为新邮箱。
  bind-success: "&a邮箱绑定成功。&7已从 &e%old% &7更新为 &b%new%&7。"
  # 验证成功后提示。
  verification-success: "&a验证成功。&7欢迎进入 &dPureblock &8| &b纯境方块&a。"
  # 老玩家登录成功提示，%player% 为玩家名，%time% 为上次登录时间。
  welcome-back: "&d&lPureblock &8| &a欢迎回来 &b%player%&a！&7您上次成功登录的时间为：&e%time%"
  # 玩家首次成功登录提示。
  first-login: "&d&lPureblock &8| &a欢迎回来 &b%player%&a！这是你第一次完成登录验证。"
  # 密码错误提示，%left% 为剩余尝试次数。
  password-wrong: "&c密码错误。剩余尝试次数：&e%left%"
  # 登录被锁定时的聊天提示。
  login-locked: "&c密码错误次数过多，登录已锁定。"
  # 密码太短提示，%min% 为最短密码长度。
  password-too-short: "&c密码太短，至少需要 &e%min% &c位。"
  # 密码修改成功提示。
  password-changed: "&a密码修改成功。请使用 &e/login &a重新登录。"
  # 邮箱验证码获取冷却提示，%seconds% 为剩余秒数。
  email-cooldown: "&c&l短时间内获取多次验证码，请等待 &a%seconds% &c&l秒后重新操作！"
  # 已注册玩家重复注册提示。
  already-registered: "&a你已经完成注册。请使用 &e/login &a登录。"
  # 未注册玩家登录或改密提示。
  not-registered: "&c你还没有注册。请先使用 &e/register&c。"
  # 已登录玩家在主世界使用登录指令时的提示，%player% 为玩家名。
  already-logged-in: "&a您已经以 &b%player% &a的身份登录成功了！"
  # 已登录玩家改绑邮箱时的前置提示。
  bindemail-verified-only: "&c请先完成登录后再修改绑定邮箱。"
  # 未验证玩家使用非白名单指令时的提示。
  command-blocked: "&c验证前只能在登录世界使用 &e/register&c、&e/login &c或 &e/changepwd&c。"
  # 未验证玩家聊天时的提示。
  chat-blocked: "&c验证前不能聊天。请使用 &e/register &c或 &e/login&c。"
  # 未验证玩家进入主世界时的踢出提示。
  unverified-kick: "&c未完成 Pureblock 身份验证，无法进入主世界。"
  # 主世界缺失时的踢出提示。
  main-world-missing: "&c主世界不存在，无法完成登录。"
  # 代理转服消息已发送时的提示，%server% 为目标子服名称。
  proxy-transfer-started: "&a身份验证通过，正在连接至 &d%server%&a。"
  # 代理转服失败且未启用本地回退时的踢出提示。
  proxy-transfer-failed: "&c代理转服失败，请稍后重试。"
  # SMTP 邮件发送成功提示。
  mail-sent: "&a验证码邮件已发送，请查收邮箱。"
  # SMTP 邮件发送失败提示。
  mail-failed: "&c邮件发送失败，请让管理员检查 SMTP 配置。测试验证码已写入后台日志。"
  # 切换语言命令格式提示。
  lang-usage: "&e用法：/lang zh 或 /lang en"
  # 切换到不支持语言时的提示，%lang% 为玩家输入的语言。
  lang-unknown: "&c暂不支持语言 &e%lang%&c。可用语言：&e/lang zh &7或 &e/lang en"
  # 语言切换成功提示，%lang% 为语言代码。
  lang-changed: "&a语言已切换为：&e%lang%"
  # 登录环境异常提示，%ip% 为当前 IP。
  suspicious-login: "&e检测到新的登录环境：&6%ip%&e。若这不是你本人操作，请尽快修改密码。"

mail:
  # 注册邮件标题。
  register-subject: "Pureblock 注册验证码"
  # 修改密码邮件标题。
  change-subject: "Pureblock 修改密码验证码"
  # 改绑邮箱邮件标题。
  bind-subject: "Pureblock 改绑邮箱验证码"

state-messages:
  # 玩家首次进入登录世界时的消息组。
  first-enter:
    enabled: true
    messages:
      - "&d&lPureblock &8| &b纯境方块"
      - "&7这里是登录专用大厅，请使用 &e/register &7创建账户。"
  # 玩家已注册但尚未登录时的消息组。
  logging-in:
    enabled: true
    messages:
      - "&d&lPureblock &8| &b纯境方块"
      - "&7欢迎回来，请使用 &e/login &7完成身份验证。"
  # 玩家验证成功后的消息组。
  verification-success:
    enabled: true
    messages:
      - "&a验证状态已更新。"
  # 玩家被锁定时的消息组。
  locked:
    enabled: true
    messages:
      - "&c密码错误次数过多，验证已锁定。"
  # 玩家改绑邮箱成功后的消息组。
  bind-success:
    enabled: true
    messages:
      - "&a邮箱改绑流程已完成。"

custom-messages:
  on-join:
    # 玩家上线时是否发送自定义消息。
    enabled: true
    # 玩家上线时发送的自定义消息列表。
    messages:
      - "&8&m--------------------------------------------------"
      - "&d&lPureblock &8| &b纯境方块 &7身份验证系统"
      - "&7请根据屏幕提示完成登录或注册。"
      - "&8&m--------------------------------------------------"
  after-login:
    # 玩家登录成功后是否发送自定义消息。
    enabled: true
    # 玩家登录成功后发送的自定义消息列表。
    messages:
      - "&a身份验证通过，欢迎进入 &dPureblock &8| &b纯境方块&a。"
      - "&7愿你在这片纯净世界里留下漂亮的建筑。"
  after-register:
    # 玩家注册成功后是否发送新手指引。
    enabled: true
    # 玩家注册成功后发送的新手指引消息列表。
    messages:
      - "&a注册成功，欢迎加入 &dPureblock &8| &b纯境方块&a。"
      - "&7请留意服务器规则，并在需要时使用 &e/bindemail &7修改绑定邮箱。"

smtp:
  # 是否启用 SMTP 邮件发送。
  enabled: false
  # SMTP 服务器地址。
  host: "smtp.example.com"
  # SMTP 服务器端口，常见 SSL 端口为 465。
  port: 465
  # 是否使用 SSL 直连。
  ssl: true
  # 是否在非 SSL 连接上启用 STARTTLS。
  starttls: false
  # SMTP 登录用户名，通常是邮箱地址。
  username: "your@example.com"
  # SMTP 登录密码，很多邮箱需要填写授权码而不是邮箱登录密码。
  password: "change-me"
  # 邮件发件人地址。
  from: "your@example.com"
  # 邮件发件人显示名称。
  from-name: "Pureblock"
