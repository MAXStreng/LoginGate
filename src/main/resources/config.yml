  main-world-missing: "&c主世界不存在，无法完成登录。"
  # 代理转服消息已发送时的提示，%server% 为目标子服名称。
  proxy-transfer-started: "&a身份验证通过，正在连接至 &d%server%&a。"
  # 代理转服失败且未启用本地回退时的踢出提示。
  proxy-transfer-failed: "&c代理转服失败，请稍后重试。"
  # 后端子服确认玩家已完成登录验证。
  backend-verified: "&a已确认你的登录验证状态，欢迎进入主服务器。"
  # 后端子服未检测到有效登录验证记录时的踢出提示。
  backend-unverified-kick: "&c未检测到有效登录验证记录，请先进入登录服务器完成验证。"
  # 玩家开启记住登录成功，%minutes% 为有效期。
  remember-login-enabled: "&a已开启记住登录。有效期：&e%minutes% &a分钟。"
  # 玩家关闭记住登录成功。
  remember-login-disabled-player: "&a已关闭记住登录。下次进入仍需输入密码。"
  # 服务器未启用记住登录。
  remember-login-disabled: "&c服务器未启用记住登录功能。"
  # 记住登录命令格式。
  remember-login-usage: "&e用法：/rememberlogin on 或 /rememberlogin off"
  # 玩家未登录时使用记住登录命令。
  remember-login-login-required: "&c请先完成登录后再设置免登录会话。"
  # 自动免登录成功。
  remember-login-success: "&a已使用记住登录会话自动完成验证。"
  # 管理员未登录时使用管理命令。
  admin-login-required: "&c管理员也需要先完成登录验证。"
  # SMTP 邮件发送成功提示。
  mail-sent: "&a验证码邮件已发送，请查收邮箱。"
  # SMTP 邮件发送失败提示。
  mail-failed: "&c邮件发送失败，请让管理员检查 SMTP 配置。测试验证码已写入后台日志。"
  # 切换语言命令格式提示。
  lang-usage: "&e用法：/lang zh 或 /lang en"
  # 切换到不支持语言时的提示，%lang% 为玩家输入的语言。
  lang-unknown: "&c暂不支持语言 &e%lang%&c。可用语言：&e/lang zh &7或 &e/lang en"
  # 语言切换成功提示，%lang% 为语言代码。
  lang-changed: "&a语言已切换为：&e%lang%"
  # 登录环境异常提示，%ip% 为当前 IP。
  suspicious-login: "&e检测到新的登录环境：&6%ip%&e。若这不是你本人操作，请尽快修改密码。"

mail:
  # 注册邮件标题。
  register-subject: "Pureblock 注册验证码"
  # 修改密码邮件标题。
  change-subject: "Pureblock 修改密码验证码"
  # 改绑邮箱邮件标题。
  bind-subject: "Pureblock 改绑邮箱验证码"
  # 安全提醒邮件标题。
  security-subject: "Pureblock 安全提醒"

state-messages:
  # 玩家首次进入登录世界时的消息组。
  first-enter:
    enabled: true
    messages:
      - "&d&lPureblock &8| &b纯境方块"
      - "&7这里是登录专用大厅，请使用 &e/register &7创建账户。"
  # 玩家已注册但尚未登录时的消息组。
  logging-in:
    enabled: true
    messages:
      - "&d&lPureblock &8| &b纯境方块"
      - "&7欢迎回来，请使用 &e/login &7完成身份验证。"
  # 玩家验证成功后的消息组。
  verification-success:
    enabled: true
    messages:
      - "&a验证状态已更新。"
  # 玩家被锁定时的消息组。
  locked:
    enabled: true
    messages:
      - "&c密码错误次数过多，验证已锁定。"
  # 玩家改绑邮箱成功后的消息组。
  bind-success:
    enabled: true
    messages:
      - "&a邮箱改绑流程已完成。"

custom-messages:
  on-join:
    # 玩家上线时是否发送自定义消息。
    enabled: true
    # 玩家上线时发送的自定义消息列表。
    messages:
      - "&8&m--------------------------------------------------"
      - "&d&lPureblock &8| &b纯境方块 &7身份验证系统"
      - "&7请根据屏幕提示完成登录或注册。"
      - "&8&m--------------------------------------------------"
  after-login:
    # 玩家登录成功后是否发送自定义消息。
    enabled: true
    # 玩家登录成功后发送的自定义消息列表。
    messages:
      - "&a身份验证通过，欢迎进入 &dPureblock &8| &b纯境方块&a。"
      - "&7愿你在这片纯净世界里留下漂亮的建筑。"
  after-register:
    # 玩家注册成功后是否发送新手指引。
    enabled: true
    # 玩家注册成功后发送的新手指引消息列表。
    messages:
      - "&a注册成功，欢迎加入 &dPureblock &8| &b纯境方块&a。"
      - "&7请留意服务器规则，并在需要时使用 &e/bindemail &7修改绑定邮箱。"

smtp:
  # 是否启用 SMTP 邮件发送。
  enabled: false
  # SMTP 服务器地址。
  host: "smtp.example.com"
  # SMTP 服务器端口，常见 SSL 端口为 465。
  port: 465
  # 是否使用 SSL 直连。
  ssl: true
  # 是否在非 SSL 连接上启用 STARTTLS。
  starttls: false
  # SMTP 登录用户名，通常是邮箱地址。
  username: "your@example.com"
  # SMTP 登录密码，很多邮箱需要填写授权码而不是邮箱登录密码。
  password: "change-me"
  # 邮件发件人地址。
  from: "your@example.com"
  # 邮件发件人显示名称。
  from-name: "Pureblock"
