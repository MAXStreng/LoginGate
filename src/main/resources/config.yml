  register-subject: "Pureblock 注册验证码"
  change-subject: "Pureblock 修改密码验证码"
  bind-subject: "Pureblock 改绑邮箱验证码"
  security-subject: "Pureblock 安全提醒"


# ============================================================
# 10. 状态消息与自定义消息
# ============================================================

state-messages:
  first-enter:
    # 玩家首次进入登录世界时发送。
    enabled: true
    messages:
      - "&d&lPureblock &8| &b纯境方块"
      - "&7这里是登录专用大厅，请使用 &e/register &7创建账户。"

  logging-in:
    # 玩家已注册但尚未登录时发送。
    enabled: true
    messages:
      - "&d&lPureblock &8| &b纯境方块"
      - "&7欢迎回来，请使用 &e/login &7完成身份验证。"

  verification-success:
    # 玩家验证成功后发送。
    enabled: true
    messages:
      - "&a验证状态已更新。"

  locked:
    # 玩家被登录锁定时发送。
    enabled: true
    messages:
      - "&c密码错误次数过多，验证已锁定。"

  bind-success:
    # 玩家改绑邮箱成功后发送。
    enabled: true
    messages:
      - "&a邮箱改绑流程已完成。"

custom-messages:
  on-join:
    # 玩家上线时是否发送自定义消息。
    enabled: true
    messages:
      - "&8&m--------------------------------------------------"
      - "&d&lPureblock &8| &b纯境方块 &7身份验证系统"
      - "&7请根据屏幕提示完成登录或注册。"
      - "&8&m--------------------------------------------------"

  after-login:
    # 玩家登录成功后是否发送自定义消息。
    enabled: true
    messages:
      - "&a身份验证通过，欢迎进入 &dPureblock &8| &b纯境方块&a。"
      - "&7愿你在这片纯净世界里留下漂亮的建筑。"

  after-register:
    # 玩家注册成功后是否发送新手指引。
    enabled: true
    messages:
      - "&a注册成功，欢迎加入 &dPureblock &8| &b纯境方块&a。"
      - "&7请留意服务器规则，并在需要时使用 &e/bindemail &7修改绑定邮箱。"


# ============================================================
# 11. SMTP 邮件发送
# ============================================================

smtp:
  # 是否启用 SMTP 邮件发送。
  enabled: false

  # SMTP 服务器地址。
  host: "smtp.example.com"

  # SMTP 服务器端口。常见 SSL 端口为 465，STARTTLS 常见端口为 587。
  port: 465

  # 是否使用 SSL 直连。
  ssl: true

  # 是否在非 SSL 连接上启用 STARTTLS。
  starttls: false

  # SMTP 登录用户名，通常是邮箱地址。
  username: "your@example.com"

  # SMTP 登录密码。很多邮箱需要填写授权码或应用专用密码，不是邮箱登录密码。
  password: "change-me"

  # 邮件发件人地址。
  from: "your@example.com"

  # 邮件发件人显示名称。
  from-name: "Pureblock"
