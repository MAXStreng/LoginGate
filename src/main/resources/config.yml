# 服务器显示名称，支持 Minecraft 颜色符号 &。
server-name: "Pureblock | 纯境方块"

# 默认语言。可选：zh、en。
default-language: "zh"

# 普通提示文案读取来源。lang=优先读取 lang/zh.yml 或 lang/en.yml；config=优先读取本文件的 messages/mail。
# 想保留 /lang 中英文切换时建议使用 lang；只想改一个文件时可改为 config。
message-source: "lang"

message-toggles:
  # 普通 messages 文案默认是否启用。单独设置某个 key 时会覆盖这里。
  default: true
  # 下方每个 key 都对应 messages 里的一条普通提示，可按需改为 false。
  welcome-title: true
  welcome-register-subtitle: true
  welcome-login-subtitle: true
  title-register-email: true
  subtitle-register-email: true
  title-register-code: true
  subtitle-register-code: true
  title-register-password: true
  subtitle-register-password: true
  title-login-password: true
  subtitle-login-password: true
  title-change-code: true
  subtitle-change-code: true
  title-change-password: true
  subtitle-change-password: true
  input-new-password: true
  locked-title: true
  locked-subtitle: true
  transfer-title: true
  transfer-subtitle: true
  register-help: true
  login-help: true
  input-email: true
  input-password: true
  input-bind-email: true
  register-code-sent: true
  bind-code-sent: true
  change-code-sent: true
  invalid-email: true
  invalid-code: true
  verification-failed-title: true
  verification-invalid-subtitle: true
  verification-expired-subtitle: true
  verification-invalid-chat: true
  verification-expired-chat: true
  code-ok-set-password: true
  code-ok-reset-password: true
  email-verification-skipped: true
  change-password-login-required: true
  register-success: true
  bind-success: true
  verification-success: true
  welcome-back: true
  first-login: true
  password-wrong: true
  login-locked: true
  password-too-short: true
  password-changed: true
  password-require-uppercase: true
  password-require-lowercase: true
  password-require-number: true
  password-require-symbol: true
  email-cooldown: true
  email-already-used: true
  verification-code-wrong: true
  verification-code-locked: true
  already-registered: true
  not-registered: true
  already-logged-in: true
  bindemail-verified-only: true
  command-blocked: true
  chat-blocked: true
  unverified-kick: true
  main-world-missing: true
  proxy-transfer-started: true
  proxy-transfer-failed: true
  backend-verified: true
  backend-unverified-kick: true
  remember-login-enabled: true
  remember-login-disabled-player: true
  remember-login-disabled: true
  remember-login-usage: true
  remember-login-login-required: true
  remember-login-success: true
  admin-login-required: true
  mail-sent: true
  mail-failed: true
  lang-usage: true
  lang-unknown: true
  lang-changed: true
  suspicious-login: true
# 绑定登录世界名称。留空时插件会按 login-world-generation.type 自动创建 login_void、login_flat 或 login_normal。
loginworld: ""

# 主世界名称，登录或注册完成后会传送到这里。
main-world: "world"

# 传送倒计时中显示的目标名称。
transfer-target-name: "Pureblock"

post-login-location:
  # 是否启用登录后传送位置策略。关闭时始终使用 main-world 出生点。
  enabled: true
  # 登录后传送目标。spawn=服务器出生大厅；last-location=玩家上次离开服务器时的位置。
  mode: "spawn"
  # 是否记录玩家离开服务器时所在的位置。使用 last-location 模式时需要开启。
  save-last-location: true

post-login-commands:
  # 是否在玩家完成登录并传送到主世界后执行命令。
  enabled: false
  # 命令执行身份。console=后台执行；player=玩家执行。
  executor: "console"
  # 登录后执行的命令列表，不需要写开头的 /。支持 %player%、%server%、%uuid%、%time%。
  commands:
    - "say %player% 已通过 LoginGate 验证"

multi-server:
  # 当前服务器角色。standalone=单服，login=登录服，backend=主服/后端子服。
  server-role: "standalone"
  # 多服兼容模式。关闭时使用本地 main-world 传送；开启后通过代理插件消息转发到目标子服。
  enabled: false
  # 放行模式。local=本地世界传送，proxy=通过 BungeeCord/Velocity 代理转服。
  transfer-mode: "local"
  # 代理端配置的目标子服名称，开启 proxy 模式后会连接到这里。
  target-server: "Pureblock"
  # 插件消息通道。BungeeCord 常用 BungeeCord；Velocity 可按代理设置改为 bungeecord:main。
  plugin-message-channel: "BungeeCord"
  # 代理转服失败时是否回退到本地 main-world。
  fallback-to-local-world: true
  # 后端子服接受最近多少秒内完成登录验证的玩家。
  backend-verified-window-seconds: 300

# 登录成功后传送到主世界前的倒计时秒数。
post-login-countdown-seconds: 3

# 登录密码最短长度。
password-min-length: 8

# 邮箱验证码位数。
verification-code-length: 6

# 邮箱验证码有效时间，单位为分钟。
verification-expire-minutes: 10

# 密码输错次数过多后的锁定时长，单位为分钟。
login-lock-minutes: 3

# 密码允许连续输错的最大次数。
max-login-attempts: 3

# 同一个邮箱重复获取验证码的冷却时间，单位为秒。
email-code-cooldown-seconds: 60

email-verification:
  # 是否启用邮箱验证码验证。关闭后注册、改密、改绑邮箱会跳过验证码环节。
  enabled: true

remember-session:
  # 是否允许玩家自行开启记住登录。玩家默认关闭，需要使用 /rememberlogin on。
  enabled: true
  # 记住登录有效期，单位为分钟。仅同 IP 且未过期时自动登录。
  expire-minutes: 10

verification-code:
  # 邮箱验证码允许连续输错的最大次数。
  max-attempts: 3
  # 验证码输错过多后的流程锁定时间，单位为分钟。锁定只发送聊天消息，不显示 title。
  lock-minutes: 3

email-unique:
  # 是否限制一个邮箱只能绑定一个账号。
  enabled: true

password-strength:
  # 是否要求密码包含大写字母。
  require-uppercase: false
  # 是否要求密码包含小写字母。
  require-lowercase: false
  # 是否要求密码包含数字。
  require-number: false
  # 是否要求密码包含符号。
  require-symbol: false

security-log:
  # 是否记录注册、登录、失败、锁定、改密、改绑、异常登录等安全日志。
  enabled: true

security-mail:
  # 是否在改密、改绑邮箱、异常登录时发送安全提醒邮件。需要 SMTP 可用。
  enabled: true

storage:
  # 玩家数据存储方式。yaml=默认本地文件，sqlite=本地数据库，mysql/mariadb=远程数据库。
  type: "yaml"
  sqlite:
    # SQLite 数据库文件位置，相对插件数据目录。
    file: "PlayerInfo/players.db"
  mysql:
    # MySQL/MariaDB 地址。
    host: "localhost"
    # MySQL/MariaDB 端口。
    port: 3306
    # 数据库名。
    database: "logingate"
    # 数据库用户名。
    username: "root"
    # 数据库密码。
    password: ""
    # 可选自定义 JDBC URL。留空时按上方信息自动生成。
    jdbc-url: ""

update-check:
  # 是否在插件启动时检查 GitHub 最新版本。
  enabled: true
  # 公开更新清单地址。默认使用 raw.githubusercontent.com，不依赖 GitHub API，也不需要 Token。
  manifest-url: "https://raw.githubusercontent.com/MAXStreng/LoginGate/main/update.json"

login-world-generation:
  # 登录世界地形类型。可选：void（虚空）、flat（超平坦）、normal（正常世界）。默认虚空。
  type: "void"

login-world-settings:
  # 兼容旧配置：为 true 时也会使用虚空生成器；新配置请优先使用 login-world-generation.type。
  void-world: true
  # 是否隔离登录世界玩家状态。开启后进入登录世界会临时清空物品、经验、效果并使用登录专用游戏模式，登录成功或退出时恢复原状态。
  isolate-player-state: true
  # 登录世界内临时使用的游戏模式，可选 SURVIVAL、CREATIVE、ADVENTURE、SPECTATOR。
  game-mode: "ADVENTURE"
  # 登录世界是否临时清空背包、装备和副手。
  clear-inventory: true
  # 登录世界是否临时清空经验等级。
  reset-exp: true
  # 登录世界是否临时清空药水效果。
  clear-potion-effects: true
  # 登录成功恢复玩家状态时是否允许恢复完整快照。关闭后任何登录后传送都不恢复背包、模式、经验、药水效果等快照内容。
  restore-snapshot: true
  # 当 post-login-location.mode 为 spawn 时是否恢复完整快照。默认 false，适合出生大厅/主城使用干净状态。
  restore-snapshot-at-spawn: false
  # 登录世界是否临时重置血量、饥饿值、饱和度和燃烧状态。
  reset-health-food: true
  # 是否禁止登录世界刷新怪物。
  disable-monster-spawn: true
  # 是否禁止登录世界天气更替。
  disable-weather-cycle: true
  # 是否锁定登录世界时间。
  lock-time: true
  # 登录世界锁定的时间刻，18000 为夜晚。
  time: 18000
  # 是否让登录世界内玩家无敌。
  invulnerable: true
  # 是否冻结未验证玩家，防止移动和跳跃。
  freeze-player: true
  # 是否让登录世界玩家互相不可见。
  hide-other-players: true

